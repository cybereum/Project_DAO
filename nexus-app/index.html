    <!-- JSON-LD Structured Data: FAQPage for search visibility -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NEXUS Protocol?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS Protocol is an open-source decentralized governance platform that makes corruption structurally impossible. It enables any city, community, company, or cause to verify participants on-chain, govern projects transparently via DAO voting, track real-world impact, and auto-release funds only when milestones are verified complete."
          }
        },
        {
          "@type": "Question",
          "name": "Who is NEXUS Protocol for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS Protocol is for governments, municipalities, NGOs, communities, enterprises, and DAOs that need transparent, verifiable governance. It serves public infrastructure projects, environmental programs, humanitarian aid, community grants, supply chains, and any use case requiring trust, accountability, and auditability."
          }
        },
        {
          "@type": "Question",
          "name": "How does NEXUS prevent corruption?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS uses smart contract milestone escrow — funds only release when verified milestone completion is confirmed on-chain. Combined with DAO governance (transparent community voting), on-chain company verification (no fake credentials), and immutable audit trails, corruption is structurally impossible rather than just policy-prohibited."
          }
        },
        {
          "@type": "Question",
          "name": "Is NEXUS Protocol free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. NEXUS Protocol is free and open source. The platform is deployable in minutes with no licence cost. Users pay only standard Ethereum gas fees for on-chain transactions."
          }
        },
        {
          "@type": "Question",
          "name": "What is the NEXUS Global Pulse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The NEXUS Global Pulse is a live monitor of current global accountability failures — from corruption and ESG greenwashing to humanitarian aid diversion and community exclusion from governance. It shows exactly which NEXUS Protocol features structurally address each concern."
          }
        },
        {
          "@type": "Question",
          "name": "How does decentralized company verification work on NEXUS?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Companies submit credentials to the VCDAO smart contract. Verified anchors confirm identity, email, website, and registration records. Once verified, companies earn immutable on-chain credentials, a reliability score, and can participate in governance, voting, and project collaboration globally."
          }
        }
      ]
    }
    </script>
