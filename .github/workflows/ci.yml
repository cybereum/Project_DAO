name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx hardhat compile

      # Report contract bytecode size (24KB EVM limit).
      # Warns on 24KB overage (Spurious Dragon), hard-fails on 96KB (three
      # times the limit) as an upper bound on runaway contract growth.
      - name: Report contract size
        run: node -e "
          const fs = require('fs');
          const path = 'artifacts/contracts/Project_DAO.sol/Project_DAO.json';
          const art = JSON.parse(fs.readFileSync(path,'utf8'));
          const bytes = (art.deployedBytecode.length - 2) / 2;
          const SPURIOUS_DRAGON = 24576;
          const HARD_CAP = 98304; // 96 KB — 4x the L1 limit; catches regressions
          console.log('Project_DAO deployed bytecode: ' + bytes + ' bytes (' + (bytes/1024).toFixed(1) + ' KB)');
          if (bytes > HARD_CAP) {
            console.error('FATAL: contract exceeds ' + (HARD_CAP/1024).toFixed(0) + ' KB hard cap.');
            process.exit(1);
          }
          if (bytes > SPURIOUS_DRAGON) {
            console.warn('WARNING: contract exceeds 24KB Spurious Dragon limit — L2 deployment only.');
          } else {
            console.log('OK: within 24KB limit.');
          }
        "

      - run: npx hardhat test

      # Dependency audit — fail on high/critical vulnerabilities
      - name: Audit dependencies
        run: npm audit --audit-level=high --production

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Build
        run: npm run build
        env:
          VITE_PROJECT_DAO_ADDRESS: '0x0000000000000000000000000000000000000001'

      # Dependency audit
      - name: Audit dependencies
        run: npm audit --audit-level=high --production

  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      # Verify SDK module loads
      - name: Verify SDK loads
        run: node -e "import('./index.js')"

      # Run SDK unit tests
      - name: Run SDK tests
        run: npm test

      # Verify TypeScript declarations compile against the SDK source.
      # We don't maintain a tsconfig — just typecheck index.d.ts directly
      # with `tsc --noEmit` using a transient TypeScript install. This
      # catches type errors in the .d.ts file without requiring TS in the
      # SDK's own dependency graph.
      - name: Typecheck index.d.ts
        run: |
          npx --yes --package=typescript@5.6 -- tsc \
            --noEmit \
            --strict \
            --target ES2022 \
            --module ES2022 \
            --moduleResolution bundler \
            --skipLibCheck \
            --esModuleInterop \
            index.d.ts

      # Dependency audit
      - name: Audit dependencies
        run: npm audit --audit-level=high --production

  # ─── ABI Sync Check ───────────────────────────────────────────────────────
  abi-sync:
    name: ABI Sync Check
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx hardhat compile
      - name: Verify ABI coverage
        run: node -e "
          const fs = require('fs');
          const art = JSON.parse(fs.readFileSync('artifacts/contracts/Project_DAO.sol/Project_DAO.json','utf8'));
          const contractFuncs = new Set(art.abi.filter(e => e.type === 'function').map(e => e.name));
          console.log('Contract has ' + contractFuncs.size + ' functions');
          // Parse SDK ABI structurally: extract function names from human-readable ABI strings
          const sdkSrc = fs.readFileSync('sdk/abi.js', 'utf8');
          const sdkFuncNames = new Set([...sdkSrc.matchAll(/function\s+(\w+)\s*\(/g)].map(m => m[1]));
          const sdkEventNames = new Set([...sdkSrc.matchAll(/event\s+(\w+)\s*\(/g)].map(m => m[1]));
          console.log('SDK ABI exposes ' + sdkFuncNames.size + ' functions, ' + sdkEventNames.size + ' events');
          const missing = [...contractFuncs].filter(f => !sdkFuncNames.has(f));
          if (missing.length > 0) {
            console.log('Functions not in SDK ABI (may be intentional): ' + missing.join(', '));
          }
          const critical = ['registerAgent','depositNativeToEscrow','transferNativeBetweenAgents','createAgentPaymentRequest','settleAgentPaymentRequest','stakeAndJoin','sendDirectMessage','getAgentProfile','getRegisteredAgents'];
          const missingCritical = critical.filter(f => !sdkFuncNames.has(f));
          if (missingCritical.length > 0) {
            console.error('FAIL: Critical functions missing from SDK ABI: ' + missingCritical.join(', '));
            process.exit(1);
          }
          console.log('OK: All critical functions present in SDK ABI');
        "

  # ─── Slither Static Analysis ───────────────────────────────────────────────
  # Runs the Slither static analyzer on the Project_DAO contracts. Scoped to
  # high/medium severity to avoid signal-drowning noise from low-severity
  # style lints. Non-fatal on findings (reports via GitHub annotations)
  # so reviewers can triage before we tighten the gate.
  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true
        id: slither
        with:
          solc-version: '0.8.26'
          node-version: 20
          target: 'contracts/Project_DAO.sol'
          slither-args: '--exclude naming-convention,solc-version,pragma,assembly --filter-paths "node_modules|contracts/VCDAO|contracts/MilestoneTracker"'
          fail-on: 'high'

  # ─── Security Scanning ─────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check for accidental secret commits
      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          # Check for private keys (grep -q to test, then show matches if found)
          if grep -rn "0x[a-fA-F0-9]\{64\}" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.json" . \
            | grep -v node_modules | grep -v artifacts | grep -v ".git" | grep -vi "test" | grep -vi "example" | grep -vi "mock" | grep -q .; then
            echo "WARNING: Potential private key found:"
            grep -rn "0x[a-fA-F0-9]\{64\}" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.json" . \
              | grep -v node_modules | grep -v artifacts | grep -v ".git" | grep -vi "test" | grep -vi "example" | grep -vi "mock" | head -5
          fi
          # Check for API keys in source
          if grep -rn "ANTHROPIC_API_KEY\|sk-ant-\|sk_live_" --include="*.js" --include="*.jsx" --include="*.ts" . \
            | grep -v node_modules | grep -v ".env.example" | grep -v ".gitignore" | grep -q .; then
            echo "FAIL: API key found in source code:"
            grep -rn "ANTHROPIC_API_KEY\|sk-ant-\|sk_live_" --include="*.js" --include="*.jsx" --include="*.ts" . \
              | grep -v node_modules | grep -v ".env.example" | grep -v ".gitignore" | head -5
            FOUND=1
          fi
          # Check for .env files committed
          if find . -name ".env" -not -path "./node_modules/*" -not -path "./.git/*" -print -quit | grep -q .; then
            echo "WARNING: .env file found in repository"
          fi
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "OK: No secrets detected"
